<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe game</title>
  </head>
  <link rel="stylesheet" href="style.css" />
  <body>
    <main>
      <h1>Tic Tac Toe</h1>
      <div class="msg-container hide">
        <p class="msg">Winner</p>
        <img
          src="https://media0.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3NzgxbHR2Y242bzRyNTZvd3YyaGZyeG5haXk3MXlweHh1b3o3bTNjMiZlcD12MV9naWZzX3NlYXJjaCZjdD1n/OqEBxidnkAut2/200.webp"
          alt="Winner celebration"
          /><br>
          <button id="new-btn">New Game</button>
      </div>
      <div class="container">
        <div class="game">
          <button class="box"></button>
          <button class="box"></button>
          <button class="box"></button>
          <button class="box"></button>
          <button class="box"></button>
          <button class="box"></button>
          <button class="box"></button>
          <button class="box"></button>
          <button class="box"></button>
        </div>
      </div>
      <btn-container>
        <button id="reset-Btn">Reset</button>
      </btn-container>
    </main>

    <script src="script.js"></script>
  </body>
</html>
